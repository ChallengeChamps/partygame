<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TeamQuiz Board 🧾</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-image: url('liste.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    overflow-x: hidden;
    color: #fff;
  }

  /* Querformat Hinweis */
  #landscape-hint {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(255,0,0,0.85);
    padding: 12px;
    text-align: center;
    font-weight: bold;
    font-size: 1.1rem;
    display: block;
    z-index: 9999;
  }

  .container {
    max-width: 95%;
    margin: auto;
    padding: 16px;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 20px;
    margin-top: 20px;
    animation: fadeIn 1s ease;
  }

  h1, h2 {
    text-align: center;
    text-shadow: 2px 2px 6px #000;
  }

  select, input, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    font-size: 1.1rem;
  }

  button {
    background-color: #ff4081;
    color: white;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  button:hover {
    background-color: #e91e63;
  }

  .menu-button {
    background-color: #4CAF50;
    color: white;
    padding: 14px 26px;
    font-size: 1.2rem;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 20px;
    transition: background-color 0.3s ease;
  }

  .menu-button:hover {
    background-color: #45a049;
  }

  .card {
    background: #fff;
    color: #000;
    border-radius: 20px;
    padding: 20px;
    margin: 20px 0;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    animation: slideUp 0.8s ease;
  }

  .hidden { display: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes slideUp {
    from { transform: translateY(100px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Board – 4 Spalten */
  .board-wrapper {
    width: 100%;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 10px;
    transform: scale(0.75);
    transform-origin: top center;
  }

  .board-column {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 6px;
    border-radius: 10px;
  }

  .col-header {
    background: rgba(255,255,255,0.9);
    color: #000;
    padding: 10px;
    text-align: center;
    font-weight: bold;
    border-radius: 10px;
  }

  .board button {
    background: rgba(255,255,255,0.9);
    color: #000;
    font-size: 1rem;
    font-weight: bold;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  .board button.used {
    background: #555;
    color: #ccc;
    pointer-events: none;
  }

  /* Farben für Spalten */
  .col-0 { background: rgba(255, 99, 71, 0.4); }
  .col-1 { background: rgba(30, 144, 255, 0.4); }
  .col-2 { background: rgba(60, 179, 113, 0.4); }
  .col-3 { background: rgba(255, 215, 0, 0.4); }

  /* Scoreboard */
  #scoreboard {
    max-height: 120px;
    overflow-y: auto;
  }

  /* Popup */
  .popup {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 85%;
    transform: translate(-50%, -50%);
    background: #fff;
    color: #000;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    z-index: 9998;
    animation: fadeIn 0.4s ease;
  }

  /* +200 Animation */
  .point-float {
    position: absolute;
    font-size: 32px;
    font-weight: bold;
    color: #00ff00;
    animation: floatUp 1s ease-out forwards;
    pointer-events: none;
    z-index: 9999;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-50px); }
  }

  /* Scoreboard Pulse */
  .score-anim {
    animation: scorePulse 0.6s ease-out;
  }

  @keyframes scorePulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.25); color: #00ff00; }
    100% { transform: scale(1); color: white; }
  }

</style>
</head>
<body>

<div id="landscape-hint">📱 Bitte das Handy ins Querformat drehen!</div>

<!-- STARTSCREEN -->
<div class="container" id="start-screen">
  <h1>TeamQuiz Board 🧾</h1>

  <label>Teamanzahl:</label>
  <select id="team-count">
    <option value="2">2 Teams</option>
    <option value="3">3 Teams</option>
    <option value="4">4 Teams</option>
    <option value="5">5 Teams</option>
  </select>

  <div id="team-names"></div>

  <label>Kategorie:</label>
  <select id="category"></select>

  <button id="start-game" class="menu-button">Spiel starten</button>
  <button onclick="location.href='startseite.html'" class="menu-button">Zurück zur Startseite</button>
</div>

<!-- GAME SCREEN -->
<div class="container hidden" id="game-screen">
  <h2 id="game-title">TeamQuiz Board</h2>
  <p id="current-team"></p>

  <div class="board-wrapper">
    <div id="board" class="board"></div>
  </div>

  <div id="scoreboard" class="card"></div>

  <button onclick="location.href='100quiz.html'" class="menu-button">Spiel beenden</button>
</div>

<!-- END SCREEN -->
<div class="container hidden" id="end-screen">
  <h2>Spiel beendet!</h2>

  <div id="final-winner" class="card"></div>
  <div id="final-scoreboard" class="card"></div>

  <button id="restart-game" class="menu-button">Erneut spielen</button>
  <button onclick="location.href='startseite.html'" class="menu-button">Zurück zur Startseite</button>
</div>

<!-- POPUP -->
<div id="popup" class="popup hidden"></div>

<script src="script100.js"></script>

</body>

  <a href="datenschutz.html">Datenschutz</a> |
  <a href="cookies.html">Cookies</a> |
  <a href="hilfe.html">Hilfe</a>
</footer>
</html>
