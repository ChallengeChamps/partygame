<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Guess Grid 🧩</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* -------------------- MOBILE GLOBAL -------------------- */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background-image: url('wm.png');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  overflow-x: hidden;
  color: #fff;
}

.container {
  width: 92%;
  margin: auto;
  padding: 16px;
  background: rgba(0,0,0,0.65);
  border-radius: 18px;
  margin-top: 20px;
  animation: fadeIn 0.8s ease;
}

h1, h2 {
  text-align: center;
  font-size: 1.8rem;
  text-shadow: 2px 2px 6px #000;
}

button, select {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  border: none;
  font-size: 1.1rem;
}

button {
  background-color: #ff4081;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background-color: #e91e63;
}

.card {
  background: #fff;
  color: #000;
  border-radius: 18px;
  padding: 18px;
  margin: 18px 0;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  animation: slideUp 0.8s ease;
  font-size: 1.1rem;
}

.hidden { display: none; }

.choice-buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 12px;
}

.choice-buttons button {
  padding: 16px;
  font-size: 1.2rem;
  border-radius: 14px;
}

.status {
  text-align: center;
  font-size: 1.3rem;
  margin-top: 10px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 16px;
}

.grid-cell {
  background: rgba(255,255,255,0.95);
  color: #000;
  border-radius: 14px;
  padding: 10px;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 0.9rem;
  box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  position: relative;
}

/* NEW: colored fields instead of X/O */
.grid-cell.red {
  background: rgba(255, 60, 60, 0.75);
  color: #000;
}

.grid-cell.blue {
  background: rgba(60, 120, 255, 0.75);
  color: #000;
}

.grid-label {
  font-weight: bold;
  font-size: 0.85rem;
  margin-bottom: 4px;
}

.grid-symbol {
  font-size: 1.6rem;
  margin-bottom: 4px;
}

.solution-player {
  font-size: 0.9rem;
  font-weight: 600;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes slideUp {
  from { transform: translateY(100px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

@keyframes pop {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* Handy: alles untereinander */
@media (max-width: 600px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
  }
}
</style>
</head>

function pickRandomPreset(category) {
  const list = presets[category];
  if (!list || list.length === 0) return null;
  const idx = Math.floor(Math.random() * list.length);
  return list[idx];
}

startGameBtn.addEventListener('click', () => {
  currentPreset = pickRandomPreset(currentCategory);
  if (!currentPreset) return;
  startScreen.classList.add('hidden');
  solutionScreen.classList.add('hidden');
  gameScreen.classList.remove('hidden');
  initGame();
});

function initGame() {
  board = Array(9).fill(null);
  currentPlayer = 'X';
  gameOver = false;
  gameStatusEl.classList.add('hidden');
  postGameButtons.classList.add('hidden');
  renderGrid();
}

function renderGrid() {
  gridEl.innerHTML = '';
  const { labels } = currentPreset;

  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      const idx = r * 3 + c;
      const cell = document.createElement('div');
      cell.className = 'grid-cell';

      const rowLabel = labels.rows[r];
      const colLabel = labels.cols[c];

      const symbolEl = document.createElement('div');
      symbolEl.className = 'grid-symbol';
      symbolEl.textContent = rowLabel.symbol + ' ' + colLabel.symbol;

      const labelEl = document.createElement('div');
      labelEl.className = 'grid-label';
      labelEl.textContent = rowLabel.text + ' × ' + colLabel.text;

      cell.appendChild(symbolEl);
      cell.appendChild(labelEl);

      cell.addEventListener('click', () => onCellClick(idx, cell));

      gridEl.appendChild(cell);
    }
  }
}

function onCellClick(idx, cell) {
  if (gameOver || board[idx] !== null) return;

  board[idx] = currentPlayer;

  if (currentPlayer === 'X') {
    cell.classList.add('red');
  } else {
    cell.classList.add('blue');
  }

  currentPlayer = currentPlayer === 'X' ? 'O' : 'X';

  checkGameState();
}

function checkGameState() {
  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let winner = null;
  for (const [a,b,c] of wins) {
    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      winner = board[a];
      break;
    }
  }

  if (winner) {
    gameOver = true;
    gameStatusEl.textContent = (winner === 'X' ? 'Rot' : 'Blau') + ' hat gewonnen!';
    gameStatusEl.classList.remove('hidden');
    postGameButtons.classList.remove('hidden');
    return;
  }

  if (board.every(cell => cell !== null)) {
    gameOver = true;
    gameStatusEl.textContent = 'Unentschieden – niemand kann mehr gewinnen.';
    gameStatusEl.classList.remove('hidden');
    postGameButtons.classList.remove('hidden');
  }
}

function showSolution() {
  if (!currentPreset) return;
  solutionGridEl.innerHTML = '';
  const { labels, players } = currentPreset;

  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 3; c++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';

      const rowLabel = labels.rows[r];
      const colLabel = labels.cols[c];

      const symbolEl = document.createElement('div');
      symbolEl.className = 'grid-symbol';
      symbolEl.textContent = rowLabel.symbol + ' ' + colLabel.symbol;

      const labelEl = document.createElement('div');
      labelEl.className = 'grid-label';
      labelEl.textContent = rowLabel.text + ' × ' + colLabel.text;

      const playerEl = document.createElement('div');
      playerEl.className = 'solution-player';
      playerEl.textContent = players[r][c];

      cell.appendChild(symbolEl);
      cell.appendChild(labelEl);
      cell.appendChild(playerEl);

      solutionGridEl.appendChild(cell);
    }
  }

  gameScreen.classList.add('hidden');
  solutionScreen.classList.remove('hidden');
}

function restartGame() {
  solutionScreen.classList.add('hidden');
  gameScreen.classList.remove('hidden');
  initGame();
}
