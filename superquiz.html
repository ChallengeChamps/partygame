<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Game</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-image: url('10von10.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      overflow-x: hidden;
      color: #fff;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 20px;
      margin-top: 40px;
      animation: fadeIn 1s ease;
    }

    h1, h2 {
      text-align: center;
      text-shadow: 2px 2px 6px #000;
    }

    select, input, button {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border-radius: 12px;
      border: none;
      font-size: 1.1rem;
      box-sizing: border-box;
    }

    button {
      background-color: #ff4081;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #e91e63;
    }

    .card {
      background: #fff;
      color: #000;
      border-radius: 20px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.8s ease;
    }

    .options button {
      margin: 10px 5px;
      background-color: #673ab7;
    }

    .hidden {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideUp {
      from { transform: translateY(100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .menu-button {
      background-color: #4CAF50;
      color: white;
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
      transition: background-color 0.3s ease;
    }

    .menu-button:hover {
      background-color: #45a049;
    }

    .scoreboard {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 1rem;
      z-index: 1000;
    }

    .plusOne, .minusOne {
      position: absolute;
      font-size: 2rem;
      font-weight: bold;
      animation: popUp 1s ease-out;
      z-index: 999;
    }

    .plusOne {
      color: #00ff00;
    }

    .minusOne {
      color: #ff4444;
    }

    @keyframes popUp {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0; transform: scale(1); top: -50px; }
    }

    @media (max-width: 600px) {
      .container {
        margin: 20px;
        padding: 15px;
      }

      h1 {
        font-size: 1.5rem;
      }

      select, input, button {
        padding: 16px;
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="setup">
    <h1>Quiz Game</h1>
    <label>Spieleranzahl (1–8):</label>
    <input type="number" id="playerCount" min="1" max="8" value="4">

    <div id="playerInputs"></div>

    <label>Kategorie:</label>
    <select id="categorySelect">
      <option value="random">Zufällig</option>
      <option value="Allgemeinwissen">Allgemeinwissen</option>
      <option value="Sport">Sport</option>
      <option value="Geschichte">Geschichte</option>
      <option value="Technik">Technik</option>
      <option value="Natur">Natur</option>
      <option value="Film und Fernsehen">Film und Fernsehen</option>
      <option value="Unnützes Wissen">Unnützes Wissen</option>
      <option value="Expertenwissen">Expertenwissen</option>
    </select>

    <button onclick="setupPlayers()">Weiter</button>
    <button onclick="window.location.href='startseite.html'">Zurück zum Hauptmenü</button>
  </div>

  <div class="container hidden" id="categoryAnimation">
    <h2>Kategorie wird ausgewählt...</h2>
    <h1 id="animatedCategory">🎲</h1>
  </div>

  <div class="container hidden" id="quizRound">
    <h2 id="currentPlayer"></h2>
    <div class="card">
      <h3 id="questionText"></h3>
      <div class="options" id="answerOptions"></div>
    </div>
  </div>

  const categories = Object.keys(questionPool);
  let remainingCategories = [...categories];
  let remainingQuestions = {};
  categories.forEach(cat => {
    remainingQuestions[cat] = [...questionPool[cat]];
  });

  let players = [];
  let scores = {};
  let currentPlayerIndex = 0;
  let currentRound = 1;
  const maxRounds = 5;
  let selectedCategory = "";

  function setupPlayers() {
    const count = parseInt(document.getElementById("playerCount").value);
    const inputDiv = document.getElementById("playerInputs");
    inputDiv.innerHTML = "";

    for (let i = 0; i < count; i++) {
      const input = document.createElement("input");
      input.placeholder = `Spieler ${i + 1}`;
      input.id = `player${i}`;
      inputDiv.appendChild(input);
    }

    const startBtn = document.createElement("button");
    startBtn.innerText = "Spiel starten";
    startBtn.onclick = () => {
      players = [];
      scores = {};
      for (let i = 0; i < count; i++) {
        const name = document.getElementById(`player${i}`).value || `Spieler ${i + 1}`;
        players.push(name);
        scores[name] = 0;
      }
      document.getElementById("setup").classList.add("hidden");
      animateCategory();
    };
    inputDiv.appendChild(startBtn);
  }

  function animateCategory() {
    document.getElementById("categoryAnimation").classList.remove("hidden");
    const catDisplay = document.getElementById("animatedCategory");
    let i = 0;
    const interval = setInterval(() => {
      catDisplay.innerText = categories[i % categories.length];
      i++;
      if (i > categories.length * 2) {
        clearInterval(interval);
        selectedCategory = document.getElementById("categorySelect").value;
        if (selectedCategory === "random") {
          const index = Math.floor(Math.random() * remainingCategories.length);
          selectedCategory = remainingCategories.splice(index, 1)[0];
        }
        catDisplay.innerText = selectedCategory;
        setTimeout(() => {
          document.getElementById("categoryAnimation").classList.add("hidden");
          startRound();
        }, 1500);
      }
    }, 200);
  }

  function startRound() {
    currentPlayerIndex = 0;
    showQuestion();
  }

  function showQuestion() {
    if (currentPlayerIndex >= players.length) {
      currentRound++;
      if (currentRound > maxRounds || remainingCategories.length === 0) {
        showResults();
      } else {
        animateCategory();
      }
      return;
    }

    document.getElementById("quizRound").classList.remove("hidden");
    const player = players[currentPlayerIndex];
    document.getElementById("currentPlayer").innerText = `Frage für ${player}`;

    const questions = remainingQuestions[selectedCategory];
    if (questions.length === 0) {
      document.getElementById("questionText").innerText = "Keine Fragen mehr in dieser Kategorie.";
      return;
    }

    const index = Math.floor(Math.random() * questions.length);
    const q = questions.splice(index, 1)[0];

    document.getElementById("questionText").innerText = q.q;
    const optionsDiv = document.getElementById("answerOptions");
    optionsDiv.innerHTML = "";

    q.a.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.innerText = opt;
      btn.onclick = () => {
        if (i === q.correct) {
          scores[player]++;
          showPlusOne(btn);
        } else {
          showMinusOne(btn);
        }

        updateScoreDisplay();
        currentPlayerIndex++;
        setTimeout(showQuestion, 1000);
      };
      optionsDiv.appendChild(btn);
    });
  }

  function showPlusOne(element) {
    const plus = document.createElement("div");
    plus.className = "plusOne";
    plus.innerText = "+1";
    plus.style.left = element.getBoundingClientRect().left + "px";
    plus.style.top = element.getBoundingClientRect().top + "px";
    document.body.appendChild(plus);
    setTimeout(() => plus.remove(), 1000);
  }

  function showMinusOne(element) {
    const minus = document.createElement("div");
    minus.className = "minusOne";
    minus.innerText = "–1";
    minus.style.left = element.getBoundingClientRect().left + "px";
    minus.style.top = element.getBoundingClientRect().top + "px";
    document.body.appendChild(minus);
    setTimeout(() => minus.remove(), 1000);
  }

  function updateScoreDisplay() {
    const scoreDiv = document.getElementById("scoreDisplay");
    scoreDiv.innerHTML = players.map(p => `${p}: ${scores[p]} Punkte`).join("<br>");
  }

  function showResults() {
    document.getElementById("quizRound").classList.add("hidden");
    document.getElementById("results").classList.remove("hidden");
    const board = document.getElementById("winnerBoard");
    board.innerHTML = "";

    const sorted = [...players].sort((a, b) => scores[b] - scores[a]);
    const highestScore = scores[sorted[0]];
    const winners = sorted.filter(p => scores[p] === highestScore);

    winners.forEach(winner => {
      const div = document.createElement("div");
      div.innerText = `🏆 ${winner} gewinnt mit ${scores[winner]} Punkten!`;
      board.appendChild(div);
    });

    sorted.forEach(p => {
      if (!winners.includes(p)) {
        const div = document.createElement("div");
        div.innerText = `${p}: ${scores[p]} Punkte`;
        board.appendChild(div);
      }
    });
  }
</script>
