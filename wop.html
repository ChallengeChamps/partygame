      border-radius: 10px;
      border: none;

    select {

      color: white;

    }

    button {

      color: white;

      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #e91e63;
    }

    .card {
      background: #fff;
      color: #000;
      border-radius: 20px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      animation: slideUp 0.8s ease;
    }

    .hidden {
      display: none;
    }

    .mode-buttons {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .mode-button {
      flex: 1;
      background-color: #607d8b;
      transition: transform 0.3s ease, background-color 0.3s ease;
    }

    .mode-button.active {
      background-color: #ff9800;

    }

    @keyframes fadeIn {

      to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideUp {
      from { transform: translateY(100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }

    playerCountInput.addEventListener('change', () => {

      if (!count) return;

      for (let i = 0; i < count; i++) {
        const input = document.createElement('input');
        input.placeholder = `Name Spieler ${i + 1}`;
        input.id = `player${i}`;
        nameInputs.appendChild(input);
      }
    });

    function setMode(selectedMode) {
      mode = selectedMode;
      modeButtons.forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.mode-button[onclick="setMode('${selectedMode}')"]`).classList.add('active');
    }

    function startGame() {
      const count = parseInt(playerCountInput.value);
      players = [];
      for (let i = 0; i < count; i++) {
        const name = document.getElementById(`player${i}`).value.trim();
        if (name) players.push(name);
      }

      if (players.length < 1) {
        alert("Bitte Namen eingeben.");
        return;
      }

      rounds = [];
      for (let i = 0; i < 2; i++) {
        rounds.push(...players);
      }

      turn = 0;

      setupArea.classList.add('hidden');
      gameArea.classList.remove('hidden');
      endArea.classList.add('hidden');

      showNextPlayer();
    }

    function showNextPlayer() {
      if (turn >= rounds.length) {
        gameArea.classList.add('hidden');
        endArea.classList.remove('hidden');
        return;
      }

      currentPlayer.textContent = `${rounds[turn]} ist dran!`;
      questionCard.textContent = "";
    }

    function choose(type) {
      const pool = questions[mode][type];
      const question = pool[Math.floor(Math.random() * pool.length)];
      questionCard.textContent = question;
    }

    function nextPlayer() {
      turn++;
