<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />

<title>Lüge oder Wahrheit 🤥</title>

<style>
  body {
    margin: 0;

    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    overflow-x: hidden;
    color: #fff;
  }

  .container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 20px;
    margin-top: 40px;
    animation: fadeIn 1s ease;
  }

  h1, h2 {
    text-align: center;
    text-shadow: 2px 2px 6px #000;
  }

  select, input, button {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    font-size: 1rem;
  }

  button {
    background-color: #ff4081;
    color: white;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  button:hover {
    background-color: #e91e63;
  }

  .menu-button {
    background-color: #4CAF50;
    color: white;
    padding: 12px 24px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 20px;
    transition: background-color 0.3s ease;
  }

  .menu-button:hover {
    background-color: #45a049;
  }

  .card {
    background: #fff;
    color: #000;
    border-radius: 20px;
    padding: 20px;
    margin: 20px 0;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    animation: slideUp 0.8s ease;
  }

  .hidden {
    display: none;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes slideUp {
    from { transform: translateY(100px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .fx-icons {
    font-size: 40px;
    text-align: center;
    margin-top: 10px;
    animation: fadeIn 0.5s ease;
  }

  .confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 999;
  }

  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 16px;
    background: linear-gradient(135deg, #ff4081, #4CAF50);
    animation: confetti-fall 2.5s linear forwards;
  }

  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); }
    100% { transform: translateY(110vh) rotate(360deg); }
  }
</style>
</head>

<!-- STARTSCREEN -->
<div class="container" id="start-screen">

    <option value="4">4 Spieler</option>
    <option value="5">5 Spieler</option>

    <option value="2">2 Runden</option>
    <option value="3">3 Runden</option>
  </select>

  <div id="player-names"></div>

  <label>Kategorie:</label>
  <select id="category"></select>

  <button id="start-game" class="menu-button">Spiel starten</button>
  <button onclick="location.href='startseite.html'" class="menu-button">Zurück zur Startseite</button>
</div>

<!-- GAME SCREEN -->
<div class="container hidden" id="game-screen">

  <div id="statement-card" class="card"></div>

  <div id="fx-icons" class="fx-icons"></div>

  <div id="scoreboard" class="card"></div>

  <button id="end-game" class="menu-button">Spiel beenden</button>
</div>

<!-- END SCREEN -->
<div class="container hidden" id="end-screen">

  <div id="final-winner" class="card"></div>
  <div id="final-scoreboard" class="card"></div>

  <button id="restart-game" class="menu-button">Erneut spielen</button>
  <button onclick="location.href='startseite.html'" class="menu-button">Zurück zur Startseite</button>
</div>

<div id="confetti" class="confetti"></div>

  categorySelect.innerHTML = "";

  const free = document.createElement("option");
  free.value = "zufall";
  free.textContent = "Zufall";
  categorySelect.appendChild(free);

  const premiumCats = ["sport", "politik", "wirtschaft", "musik", "geschichte", "filme und serien"];

  premiumCats.forEach(cat => {
    const opt = document.createElement("option");
    opt.value = cat;

    if (hasPremium) {
      opt.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);

      opt.textContent = cat.charAt(0).toUpperCase() + cat.slice(1) + " (Premium 💎)";

/* ============================
   SOUNDS
============================ */

const soundCorrect = new Audio("yay.mp3");
const soundWrong = new Audio("oh.mp3");
const soundWin = new Audio("sieg.mp3");

/* ============================
   GAME STATE
============================ */

let players = [];
let scores = [];
let turnOrder = [];
let currentTurn = 0;
let availableStatements = [];

/* ============================
   PLAYER INPUTS
============================ */

const playerNamesDiv = document.getElementById("player-names");
const playerCountSelect = document.getElementById("player-count");

function renderPlayerInputs() {
  playerNamesDiv.innerHTML = "";
  const count = parseInt(playerCountSelect.value);

  for (let i = 0; i < count; i++) {
    const input = document.createElement("input");
    input.placeholder = `Spieler ${i+1}`;
    playerNamesDiv.appendChild(input);
  }
}

renderPlayerInputs();
playerCountSelect.addEventListener("change", renderPlayerInputs);

/* ============================
   START GAME
============================ */

document.getElementById("start-game").addEventListener("click", () => {
  const count = parseInt(playerCountSelect.value);
  const rounds = parseInt(document.getElementById("round-count").value);
  const selectedCat = categorySelect.value;

  players = [];
  scores = [];

  document.querySelectorAll("#player-names input").forEach((inp, i) => {
    players.push(inp.value || `Spieler ${i+1}`);
    scores.push(0);
  });

  turnOrder = [];
  for (let r = 0; r < rounds; r++) {
    for (let t = 0; t < 3; t++) {
      for (let p = 0; p < count; p++) {
        turnOrder.push(p);
      }
    }
  }

  if (selectedCat === "zufall") {
    availableStatements = [...statements];
  } else {
    availableStatements = statements.filter(s => s.cat === selectedCat);
  }

  shuffle(availableStatements);

  if (availableStatements.length < turnOrder.length) {
    alert("Nicht genug Thesen für diese Kategorie.");
    return;
  }

  document.getElementById("start-screen").classList.add("hidden");
  document.getElementById("game-screen").classList.remove("hidden");

  nextTurn();
});

/* ============================
   SHUFFLE
============================ */

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

/* ============================
   NEXT TURN
============================ */

function nextTurn() {
  if (currentTurn >= turnOrder.length) {
    endGame();
    return;
  }

  const playerIndex = turnOrder[currentTurn];
  const playerName = players[playerIndex];

  document.getElementById("current-player").textContent = "Spieler: " + playerName;

  const st = availableStatements[currentTurn];
  document.getElementById("statement-card").textContent = st.text;

  document.getElementById("result-banner").classList.add("hidden");
  document.getElementById("fx-icons").innerHTML = "";

  document.getElementById("btn-true").onclick = () => answer(true, playerIndex, st);
  document.getElementById("btn-false").onclick = () => answer(false, playerIndex, st);

  renderScoreboard();
}

/* ============================
   ANSWER
============================ */

function answer(ans, playerIndex, st) {
  const correct = ans === st.correct;

  const banner = document.getElementById("result-banner");
  const fx = document.getElementById("fx-icons");

  banner.classList.remove("hidden");

  if (correct) {
    scores[playerIndex]++;
    banner.textContent = "Richtig!";
    fx.innerHTML = "✔️✔️✔️";
    soundCorrect.play();
  } else {
    banner.textContent = "Falsch!";
    fx.innerHTML = "❌❌❌";
    soundWrong.play();
  }

  renderScoreboard();

  setTimeout(() => {
    currentTurn++;
    nextTurn();
  }, 1200);
}

/* ============================
   SCOREBOARD
============================ */

function renderScoreboard() {
  let html = "<h3>Punkte:</h3>";
  html += "<ul>";

  players.forEach((p, i) => {
    html += `<li>${p}: ${scores[i]} Punkte</li>`;
  });

  html += "</ul>";
  document.getElementById("scoreboard").innerHTML = html;
}

/* ============================
   END GAME
============================ */

document.getElementById("end-game").addEventListener("click", endGame);

function endGame() {
  const max = Math.max(...scores);
  const winners = players.filter((p, i) => scores[i] === max);

  document.getElementById("game-screen").classList.add("hidden");
  document.getElementById("end-screen").classList.remove("hidden");

  document.getElementById("final-winner").textContent =
    winners.length === 1
      ? `Gewinner: ${winners[0]} (${max} Punkte)`
      : `Unentschieden: ${winners.join(", ")} (${max} Punkte)`;

  let html = "<h3>Endstand:</h3><ul>";
  players.forEach((p, i) => {
    html += `<li>${p}: ${scores[i]} Punkte</li>`;
  });
  html += "</ul>";

  document.getElementById("final-scoreboard").innerHTML = html;

  soundWin.play();
  spawnConfetti(80);
}

/* ============================
   CONFETTI
============================ */

function spawnConfetti(count) {
  const container = document.getElementById("confetti");
  container.innerHTML = "";

  for (let i = 0; i < count; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.left = Math.random()*100 + "vw";
    piece.style.animationDelay = Math.random()*1 + "s";
    container.appendChild(piece);
  }

  setTimeout(() => container.innerHTML = "", 3000);
}

/* ============================
   RESTART
============================ */

document.getElementById("restart-game").addEventListener("click", () => {
  scores = scores.map(() => 0);
  currentTurn = 0;

  shuffle(availableStatements);

  document.getElementById("end-screen").classList.add("hidden");
  document.getElementById("game-screen").classList.remove("hidden");

  nextTurn();
});
</script>
