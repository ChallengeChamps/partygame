let usedQuestions = [];
let teams = [];
let scores = {};
let totalRounds = 0;
let currentRound = 0;
let currentCategory = "";
let currentQuestion = "";
let matchup = [];

// ----------------------------
// STARTSCREEN → TEAMNAMEN
// ----------------------------

function goToTeamNames() {
  const players = Number(document.getElementById("playerCount").value);
  const teamCount = Number(document.getElementById("teamCount").value);

  if (players < teamCount) {
    alert("Spieleranzahl muss mindestens so groß sein wie die Teamanzahl!");
    return;
  }

  document.getElementById("screen-start").classList.add("hidden");
  document.getElementById("screen-teamnames").classList.remove("hidden");

  const container = document.getElementById("teamNameInputs");
  container.innerHTML = "";

  for (let i = 1; i <= teamCount; i++) {
    container.innerHTML += `
      <input class="team-input" id="team${i}" value="Team ${i}">
    `;
  }
}

// ----------------------------
// TEAMNAMEN → SPIEL STARTEN
// ----------------------------

function startGame() {
  const teamCount = Number(document.getElementById("teamCount").value);

  teams = [];
  scores = {};

  for (let i = 1; i <= teamCount; i++) {
    const name = document.getElementById(`team${i}`).value || `Team ${i}`;
    teams.push(name);
    scores[name] = 0;
  }

  totalRounds = teams.length * 2 - 1;
  currentRound = 0;

  document.getElementById("screen-teamnames").classList.add("hidden");
  nextRound();
}

// ----------------------------
// RUNDE STARTEN
// ----------------------------

function nextRound() {
  if (currentRound >= totalRounds) {
    return showFinal();
  }

  currentRound++;

  const startTeam = teams[Math.floor(Math.random() * teams.length)];
  document.getElementById("startTeamText").innerText =
    `Startteam der Runde: ${startTeam}`;

  currentCategory = categories[Math.floor(Math.random() * categories.length)];
  document.getElementById("categoryText").innerText =
    `Kategorie: ${currentCategory}`;

  let t1 = teams[Math.floor(Math.random() * teams.length)];
  let t2 = teams[Math.floor(Math.random() * teams.length)];

  while (t1 === t2) {
    t2 = teams[Math.floor(Math.random() * teams.length)];
  }

  matchup = [t1, t2];
  document.getElementById("matchupText").innerText =
    `${t1} gegen ${t2}`;

  document.getElementById("screen-category").classList.remove("hidden");
}

// ----------------------------
// FRAGE ANZEIGEN
// ----------------------------

function showQuestion() {
  document.getElementById("screen-category").classList.add("hidden");

  let qList = questions[currentCategory];
  let q = qList[Math.floor(Math.random() * qList.length)];

  while (usedQuestions.includes(q)) {
    q = qList[Math.floor(Math.random() * qList.length)];
  }

  usedQuestions.push(q);
  currentQuestion = q;

  document.getElementById("questionText").innerText = q;
  document.getElementById("screen-question").classList.remove("hidden");
}

// ----------------------------
// ERGEBNIS
// ----------------------------

function showResult() {
  document.getElementById("screen-question").classList.add("hidden");
  document.getElementById("screen-result").classList.remove("hidden");

  const container = document.getElementById("resultButtons");
  container.innerHTML = "";

  matchup.forEach(team => {
    container.innerHTML += `
      <button onclick="awardPoint('${team}')">${team} gewinnt</button>
    `;
  });
}

function awardPoint(team) {
  scores[team]++;
  document.getElementById("screen-result").classList.add("hidden");
  nextRound();
}

// ----------------------------
// FINALE
// ----------------------------

function showFinal() {
  document.getElementById("screen-final").classList.remove("hidden");

  const container = document.getElementById("finalScores");
  container.innerHTML = "";

  let winner = "";
  let maxPoints = -1;

  for (let t of teams) {
    container.innerHTML += `<p>${t}: ${scores[t]} Punkte</p>`;
    if (scores[t] > maxPoints) {
      maxPoints = scores[t];
      winner = t;
    }
  }

  document.getElementById("winnerTeam").innerText =
    `Gewinnerteam: ${winner} 🎉`;
}

// ----------------------------
// RESTART
