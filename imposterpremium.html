let state = {
    players: [],
    imposters: [],
    category: "buntegemischt",
    questions: [],
    answers: [],
    currentIndex: 0,
    roundQuestion: null
};

function renderStart() {
    app.innerHTML = `
        <h1>Wer lügt am Besten 🔍</h1>

        <label>Spieleranzahl (min. 3):</label>
        <select id="playerCount">
            ${Array.from({length: 12}, (_,i)=>`<option value="${i+1}">${i+1}</option>`).join("")}
        </select>

        <label>Imposter Anzahl (min. 1):</label>
        <select id="imposterCount"></select>

        <label>Kategorie:</label>
        <select id="category">
            <option value="buntegemischt">Zufall 🎲</option>
            <option value="fußball">Fußball ⚽</option>
            <option value="musik">Musik 🎵</option>
            <option value="politik">Wirtschaft 🏦</option>
            <option value="essen">Essen 🍕</option>
        </select>

        <div id="nameInputs"></div>

        <button onclick="generateNames()">Namen eingeben</button>
        <button onclick="startGame()">Starten</button>
        <button class="menu-button" onclick="window.location.href='startseite.html'">Zurück zum Hauptmenü</button>
    `;

    updateImposterOptions();
}

function updateImposterOptions() {
    const count = parseInt(document.getElementById("playerCount").value);
    const imposterSelect = document.getElementById("imposterCount");
    imposterSelect.innerHTML = "";

    if (count < 3) {
        imposterSelect.innerHTML = `<option value="0">0</option>`;
        return;
    }

    const maxImposters = count - 2;

    for (let i = 1; i <= maxImposters; i++) {
        imposterSelect.innerHTML += `<option value="${i}">${i}</option>`;
    }
}

document.addEventListener("change", e => {
    if (e.target.id === "playerCount") updateImposterOptions();
});

function generateNames() {
    const count = parseInt(document.getElementById("playerCount").value);
    const container = document.getElementById("nameInputs");
    container.innerHTML = "";

    for (let i = 0; i < count; i++) {
        container.innerHTML += `<input id="player${i}" placeholder="Spieler ${i+1} Name">`;
    }
}

function startGame() {
    const count = parseInt(document.getElementById("playerCount").value);
    const impCount = parseInt(document.getElementById("imposterCount").value);
    const cat = document.getElementById("category").value;

    if (count < 3) return alert("Mindestens 3 Spieler!");
    if (impCount < 1) return alert("Mindestens 1 Imposter!");

    let names = [];
    for (let i = 0; i < count; i++) {
        const name = document.getElementById(`player${i}`).value.trim();
        if (!name) return alert("Bitte alle Namen eingeben!");
        names.push(name);
    }

    state.players = names;
    state.category = cat;
    state.questions = categories[cat];
    state.answers = [];
    state.currentIndex = 0;

    let shuffled = [...names].sort(() => Math.random() - 0.5);
    state.imposters = shuffled.slice(0, impCount);

    state.roundQuestion = state.questions[Math.floor(Math.random() * state.questions.length)];

    renderCard();
}

function renderCard() {
    const player = state.players[state.currentIndex];

    app.innerHTML = `
        <h2>${player}</h2>
        <div class="card">Aufdecken</div>
        <button onclick="renderQuestion()">Aufdecken</button>
    `;
}

function renderQuestion() {
    const player = state.players[state.currentIndex];
    const isImposter = state.imposters.includes(player);

    const questionText = isImposter
        ? state.roundQuestion.imposter
        : state.roundQuestion.normal;

    app.innerHTML = `
        <h2>${player}</h2>
        <div class="card">${questionText}</div>
        <input id="answer" placeholder="Deine Antwort">
        <button onclick="saveAnswer()">Weiter</button>
    `;
}

function saveAnswer() {
    const answer = document.getElementById("answer").value.trim();
    if (!answer) return alert("Bitte eine Antwort eingeben!");

    state.answers.push({
        player: state.players[state.currentIndex],
        answer: answer
    });

    state.currentIndex++;

    if (state.currentIndex >= state.players.length) {
        renderResults();
    } else {
        renderCard();
    }
}

function renderResults() {
    const q = state.roundQuestion.normal;

    app.innerHTML = `
        <h2>Richtige Frage:</h2>
        <div class="card">${q}</div>

        <h2>Antworten:</h2>
        ${state.answers.map(a => `
            <div class="card"><b>${a.player}:</b> ${a.answer}</div>
        `).join("")}

        <button onclick="showImposters()">Wer ist der Imposter?</button>
    `;
}

function showImposters() {
    app.innerHTML = `
        <h2>Imposter:</h2>
        ${state.imposters.map(i => `<div class="card">${i}</div>`).join("")}
        <button onclick="renderStart()">Zurück</button>
    `;
}

renderStart();
