<title>MatchMaster ⚽</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-image: url('wm.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    overflow-x: hidden;
    color: #fff;
  }

  .container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
    background: rgba(0,0,0,0.6);
    border-radius: 20px;
    margin-top: 40px;
    animation: fadeIn 1s ease;
  }

  h1, h2 {
    text-align: center;
    text-shadow: 2px 2px 6px #000;
  }

  select, input, button {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    font-size: 1rem;
  }

  button {
    background-color: #ff4081;
    color: white;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  button:hover {
    background-color: #e91e63;
  }

  .menu-button {
    background-color: #4CAF50;
    color: white;
    padding: 12px 24px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 20px;
    transition: background-color 0.3s ease;
  }

  .menu-button:hover {
    background-color: #45a049;
  }

  .card {
    background: #fff;
    color: #000;
    border-radius: 20px;
    padding: 20px;
    margin: 20px 0;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    animation: slideUp 0.8s ease;
    position: relative;
  }

  .hidden { display: none; }

  .result-icon {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 4rem;
    transform: scale(0);
    opacity: 0;
    transition: transform 0.25s ease, opacity 0.25s ease;
    z-index: 10;
  }

  .result-icon.show {
    transform: scale(1.4);
    opacity: 1;
    animation: popBounce 0.35s ease;
  }

  @keyframes popBounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.6); }
    100% { transform: scale(1.3); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes slideUp {
    from { transform: translateY(100px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>
</head>

<audio id="bg-sound" src="wm.mp3" autoplay loop></audio>

<div class="container" id="start-screen">

    <option value="mittel">Mittel</option>
    <option value="schwer">Schwer</option>
    <option value="zufall">Zufall</option>
  </select>

  <button id="start-game" class="menu-button">Spiel starten</button>
  <button onclick="location.href='startseite.html'" class="menu-button">Zur Startseite</button>
</div>

<div class="container hidden" id="game-screen">

  <div id="answer-buttons"></div>
</div>

<div class="container hidden" id="end-screen">

  <button id="restart-game" class="menu-button">Erneut spielen</button>

</div>

let players = [];
let scores = {};
let used = [];
let currentPlayer = 0;
let difficulty = "leicht";
let totalRounds = 0;

const startScreen = document.getElementById("start-screen");
const gameScreen = document.getElementById("game-screen");
const endScreen = document.getElementById("end-screen");

const playerNamesDiv = document.getElementById("player-names");
const roundTitle = document.getElementById("round-title");
const matchContent = document.getElementById("match-content");
const resultIcon = document.getElementById("result-icon");
const answerButtons = document.getElementById("answer-buttons");
const winnerCard = document.getElementById("winner-card");

document.getElementById("player-count").addEventListener("change", () => {
  const count = parseInt(document.getElementById("player-count").value);
  playerNamesDiv.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const input = document.createElement("input");
    input.placeholder = `Spieler ${i + 1}`;
    playerNamesDiv.appendChild(input);
  }
});

document.getElementById("start-game").addEventListener("click", () => {
  const inputs = playerNamesDiv.querySelectorAll("input");

  if (inputs.length === 0) {
    alert("Bitte Spieleranzahl wählen!");
    return;
  }

  players = [...inputs].map((i, idx) => i.value || `Spieler ${idx+1}`);
  difficulty = document.getElementById("difficulty").value;

  players.forEach(p => scores[p] = 0);

  totalRounds = players.length * 3;
  used = [];
  currentPlayer = 0;

  startScreen.classList.add("hidden");
  gameScreen.classList.remove("hidden");

  nextRound();
});

function nextRound() {
  if (used.length >= totalRounds || used.length >= matches.length) {
    endGame();
    return;
  }

  resultIcon.innerHTML = "";
  resultIcon.classList.remove("show");

  const player = players[currentPlayer];
  roundTitle.textContent = `${player} ist dran`;

  const available = matches.filter(m => !used.includes(m));
  const match = available[Math.floor(Math.random() * available.length)];
  used.push(match);

  renderMatch(match);
}

function renderMatch(match) {
  matchContent.innerHTML = `
    <h3>${match.teams}</h3>
    <h2>${match.score}</h2>
    ${match.scorers.map(s => `<p>${s}</p>`).join("")}
  `;

  renderAnswers(match);
}

function renderAnswers(match) {
  answerButtons.innerHTML = "";

  match.answers.forEach(answer => {
    const btn = document.createElement("button");
    btn.textContent = answer;
    btn.onclick = () => checkAnswer(answer, match);
    answerButtons.appendChild(btn);
  });
}

function checkAnswer(answer, match) {
  if (answer === match.tournament) {
    scores[players[currentPlayer]]++;
    new Audio("yay.mp3").play();
    resultIcon.innerHTML = "✔️";
    resultIcon.style.color = "#4CAF50";
  } else {
    new Audio("oh.mp3").play();
    resultIcon.innerHTML = "❌";
    resultIcon.style.color = "#ff0000";
  }

  resultIcon.classList.add("show");

  currentPlayer = (currentPlayer + 1) % players.length;
  setTimeout(nextRound, 1500);
}

function endGame() {
  gameScreen.classList.add("hidden");
  endScreen.classList.remove("hidden");

  new Audio("sieg.mp3").play();

  const winner = [...players].sort((a,b) => scores[b] - scores[a])[0];
  winnerCard.innerHTML = `<h3>${winner} hat gewonnen! 🎉</h3>`;
}

document.getElementById("restart-game").addEventListener("click", () => {
  endScreen.classList.add("hidden");
  gameScreen.classList.remove("hidden");

  used = [];
  currentPlayer = 0;
  nextRound();
});
</script>
