<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>PlayerMaster ⭐</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background-image: url('wm.png');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  overflow-x: hidden;
  color: #fff;
}

/* SPIELTITEL PlayerMaster ⭐ */
h1 {
  font-size: 4rem;            /* deutlich größer */
  text-align: center;
  margin-top: 20px;
  margin-bottom: 30px;
  text-shadow: 2px 2px 6px #000;
}

.container {
  max-width: 650px;
  margin: auto;
  padding: 32px;              
  background: rgba(0,0,0,0.6);
  border-radius: 24px;        
  margin-top: 32px;
  animation: fadeIn 1s ease;
}

/* Kategorie wählen */
label {
  font-size: 3.0rem;          /* größer */
  font-weight: bold;
  display: block;
  text-align: center;
  margin-bottom: 20px;
  text-shadow: 2px 2px 6px #000;
}

/* Premium Kategorie Titel */
#premiumPopup h3 {
  font-size: 3.0rem;          /* größer */
  margin-bottom: 20px;
  text-shadow: 2px 2px 6px #000;
}

/* Premium Kategorie Beschreibung */
#premiumPopup p {
  font-size: 2.0rem;          /* endlich groß */
  margin-bottom: 30px;
  text-shadow: 2px 2px 6px #000;
}

select, input, button {
  width: 100%;
  padding: 30px;              
  margin: 24px 0;             
  border-radius: 24px;        
  border: none;
  font-size: 2.2rem;          
}

button {
  background-color: #ff4081;
  color: white;
  cursor: pointer;
  transition: background-color 0.3s;
}

button:hover {
  background-color: #e91e63;
}

.card {
  background: #fff;
  color: #000;
  border-radius: 32px;        
  padding: 40px;              
  margin: 40px 0;             
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  animation: slideUp 0.8s ease;
  font-size: 2.2rem;          
}

.hidden { display: none; }

.menu-button {
  background-color: #4CAF50;
  color: white;
  padding: 32px;              
  font-size: 2.4rem;          
  border-radius: 24px;        
  margin-top: 20px;
}

.menu-button:hover {
  background-color: #45a049;
}

.premium-popup {
  background: rgba(0,0,0,0.85);
  padding: 40px;              
  border-radius: 32px;        
  text-align: center;
  margin-top: 26px;
  display: none;
  animation: fadeIn 0.4s ease;
}

.premium-popup button {
  background-color: #ff4081;
  margin-top: 20px;
  padding: 30px;              
  font-size: 2.2rem;          
  border-radius: 24px;        
}

@keyframes fadeIn {
  from { 
    opacity: 0; 
    transform: scale(0.85);
  }
  to { 
    opacity: 1; 
    transform: scale(1); 
  }
}

@keyframes slideUp {
  from { 
    transform: translateY(160px);
    opacity: 0; 
  }
  to { 
    transform: translateY(0); 
    opacity: 1; 
  }
}




</style>
</head>
<body>

<audio id="bg-sound" src="wm.mp3" autoplay loop></audio>

<!-- STARTSCREEN -->
<div class="container" id="startScreen">
  <h1>PlayerMaster ⭐</h1>

  <label>Kategorie wählen:</label>
  <select id="themeSelect">
    <option value="fussball">⚽ Fußball - Spieler</option>
    <option value="wirtschaft">🏦 Wirtschaft (Premium 💎)</option>
    <option value="musik">🎶 Musik (Premium 💎)</option>
    <option value="filme">🎥 Filme (Premium 💎)</option>
    <option value="geografie">🌍 Geografie (Premium 💎)</option>
    <option value="tiere">🙉 Tiere (Premium 💎)</option>
  </select>

  <!-- Premium Popup -->
  <div id="premiumPopup" class="premium-popup">
    <h3>Premium Kategorie 🔒</h3>
    <p>Diese Kategorie ist nur mit Premium spielbar.</p>
    <button onclick="closePremiumPopup()">OK</button>
  </div>

  <button id="start-game" class="menu-button">Starten</button>
  <button onclick="location.href='startseite.html'" class="menu-button">Zur Startseite</button>
</div>

<!-- GAME SCREEN -->
<div class="container hidden" id="game-screen">
  <h2 id="round-title"></h2>

  <div id="player-card" class="card">
    <div id="player-content"></div>
  </div>

  <div id="category-buttons"></div>
</div>

<!-- END SCREEN -->
<div class="container hidden" id="end-screen">
  <h2>Spiel beendet!</h2>
  <div id="summary-card" class="card"></div>
  <button id="restart-game" class="menu-button">Nochmal spielen</button>
  <button onclick="location.href='startseite.html'" class="menu-button">Zur Startseite</button>
</div>

let players = playerPools["fussball"];
let categories = categorySets["fussball"];

let usedCategories = [];
let usedPlayers = [];
let round = 0;
let totalPoints = 0;
let history = [];

document.getElementById("start-game").addEventListener("click", () => {
  const selected = themeSelect.value;

  players = playerPools[selected];
  categories = categorySets[selected];

  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("game-screen").classList.remove("hidden");

  startGame();
});

function startGame() {
  usedCategories = [];
  usedPlayers = [];
  round = 0;
  totalPoints = 0;
  history = [];
  nextRound();
}

function nextRound() {
  if (round >= 8) {
    endGame();
    return;
  }

  const availablePlayers = players.filter(p => !usedPlayers.includes(p));
  const player = availablePlayers[Math.floor(Math.random() * availablePlayers.length)];
  usedPlayers.push(player);

  document.getElementById("round-title").textContent = `Runde ${round + 1} von 8`;
  document.getElementById("player-content").innerHTML = `<h3>${player.name}</h3>`;

  renderCategories(player);
}

function renderCategories(player) {
  const container = document.getElementById("category-buttons");
  container.innerHTML = "";

  const availableCats = categories.filter(c => !usedCategories.includes(c.key));

  availableCats.forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = cat.label;
    btn.onclick = () => chooseCategory(player, cat);
    container.appendChild(btn);
  });
}

function chooseCategory(player, cat) {
  usedCategories.push(cat.key);

  const points = player.stats[cat.key];
  totalPoints += points;

  history.push({
    player: player.name,
    category: cat.label,
    points: points
  });

  round++;
  nextRound();
}

function endGame() {
  document.getElementById("game-screen").classList.add("hidden");
  document.getElementById("end-screen").classList.remove("hidden");

  document.getElementById("summary-card").innerHTML = `
    <h3>Gesamtpunkte: ${totalPoints}</h3>
    <hr>
    ${history.map(h => `
      <p><b>${h.player}</b> → ${h.category}: ${h.points} Punkte</p>
    `).join("")}
  `;
}

document.getElementById("restart-game").addEventListener("click", () => {
  document.getElementById("end-screen").classList.add("hidden");
  document.getElementById("game-screen").classList.remove("hidden");
  startGame();
});
</script>
